<!DOCTYPE html>
<html>
<head>
  <title>Butler Destination AG</title>
  <style>
    #gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .gallery-img {
      width: 200px;
      cursor: pointer;
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    #modal img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

  <div id="gallery"></div>

  <div id="modal">
    <span onclick="closeModal()" style="position:absolute; top:20px; right:30px; color:white; font-size:30px; cursor:pointer;">&times;</span>
    
    <img id="modal-img">
    
    <button onclick="prevImage()" style="position:absolute; left:20px;">◀</button>
    <button onclick="nextImage()" style="position:absolute; right:20px;">▶</button>
  </div>

<script>
const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");

let currentIndex = 0;
let images = [];

fetch("images4.json")
  .then(res => res.json())
  .then(data => {
    images = data;

    images.forEach((src, index) => {
      const img = document.createElement("img");
      img.src = "images/" + src;
      img.className = "gallery-img";

      img.onclick = () => openModal(index);

      gallery.appendChild(img);
    });
  });

function openModal(index) {
  currentIndex = index;
  modal.style.display = "flex";
  modalImg.src = "images/" + images[index];
}

function closeModal() {
  modal.style.display = "none";
}

function nextImage() {
  currentIndex = (currentIndex + 1) % images.length;
  modalImg.src = "images/" + images[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  modalImg.src = "images/" + images[currentIndex];
}
</script>
